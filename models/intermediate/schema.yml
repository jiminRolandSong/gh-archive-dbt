version: 2

models:
  - name: int_repo_daily_stats
    description: "Daily aggregated stats per repository. Ephemeral - never materialized directly, inlined as CTE into mart models."
    columns:
      - name: surrogate_key
        description: "Hash of repo_id + date_day. Unique per repo per day."
        tests:
          - unique
          - not_null
      - name: repo_id
        description: "GitHub repository ID"
        tests:
          - not_null:
              config:
                severity: warn 
      - name: star_count
        description: "WatchEvents received on date_day"
      - name: fork_count
        description: "ForkEvents received on date_day"
      - name: unique_contributors
        description: "Distinct actors who triggered any event on date_day"

  - name: int_developer_activity
    description: "Daily aggregated activity per developer. Ephemeral - inlined as CTE into mart models."
    columns:
      - name: surrogate_key
        description: "Hash of actor_id + date_day. Unique per developer per day."
        tests:
          - unique
          - not_null
      - name: actor_id
        description: "GitHub user ID"
        tests:
          - not_null
      - name: code_contribution_ratio
        description: "code_contributions / total_events. Null if total_events = 0."

  - name: int_pr_labels
    description: "PR label events flattened from the labels array in PullRequestEvent payloads. Ephemeral - inlined as CTE into mart_label_usage. Filtered to action = 'labeled' only."
    columns:
      - name: event_id
        description: "GitHub event ID for the labeling action"
        tests:
          - not_null
      - name: pr_number
        description: "Pull request number within the repository"
      - name: label_name
        description: "Name of the label applied (e.g. 'bug', 'dependencies')"
        tests:
          - not_null
      - name: label_position
        description: "Index of this label within the labels array on the event (0-based)"