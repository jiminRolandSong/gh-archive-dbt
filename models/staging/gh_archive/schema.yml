version: 2

models:
  - name: stg_gh_events
    description: "Deduplicated, lightly typed GitHub events. One row per unique event_id."
    columns:
      - name: event_id
        description: "Unique GitHub event ID, deduplicated"
        tests:
          - unique
          - not_null

      - name: event_type
        description: "Type of GitHub event"
        tests:
          - not_null
          - accepted_values:
              values:
                - 'PushEvent'
                - 'WatchEvent'
                - 'PullRequestEvent'
                - 'IssuesEvent'
                - 'ForkEvent'
                - 'CreateEvent'
                - 'DeleteEvent'
                - 'IssueCommentEvent'
                - 'PullRequestReviewEvent'
                - 'PullRequestReviewCommentEvent'
                - 'CommitCommentEvent'
                - 'ReleaseEvent'
                - 'PublicEvent'
                - 'MemberEvent'
                - 'GollumEvent'
                - 'SponsorshipEvent'
              config:
                severity: warn  # GH Archive adds new event types occasionally - warn, don't fail the build