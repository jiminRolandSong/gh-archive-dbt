
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'gh_archive'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'gh_archive'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
#
# Materialization strategy by layer:
#   staging      -> view        (cheap, no storage cost, light transforms)
#   intermediate -> ephemeral   (inlined as CTEs, never queried directly)
#   marts        -> table       (final outputs queried by BI tools / Claude API)
# Note: stg_gh_events itself overrides this to `incremental` inside its own
# {{ config(...) }} block, since it's the one model with real volume (GH Archive
# emits ~30k-60k events/hour). That in-file override takes precedence over this
# folder-level default - see materialization precedence order.
models:
  gh_archive:
    staging:
      +materialized: view
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
